<!DOCTYPE html>
<html><body style='background:black;color:white'>
<h2>Update Config</h2>
<textarea id='cfg' rows='15' cols='40'></textarea><br>
<button onclick='u()'>Update</button>
<script>
async function u(){
await fetch('/update',{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({config:document.getElementById('cfg').value})})
alert('Updated')
}
</script>
</body></html>
